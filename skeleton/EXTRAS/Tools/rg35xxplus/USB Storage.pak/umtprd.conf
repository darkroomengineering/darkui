# uMTP-Responder config for darkUI (rg35xxplus)
# See workspace/rg35xxplus/other/uMTP-Responder/conf/umtprd.conf for the
# full annotated upstream example this is trimmed from.

# keep the daemon alive across cable unplug/replug; the pak toggle (not the
# cable) owns the daemon's lifetime
loop_on_disconnect 1

storage "/mnt/mmc" "SDCARD" "rw"

manufacturer "Darkroom"
product "darkUI RG35XXSP"
serial "00000000"

firmware_version "1.0"

mtp_extensions "microsoft.com: 1.0; android.com: 1.0;"

interface "MTP"

usb_vendor_id  0x18d1 # Google Inc.
usb_product_id 0x4ee1 # Nexus/Android-style MTP gadget id
usb_class 0x6         # Image
usb_subclass 0x1      # Still Imaging device
usb_protocol 0x1

usb_dev_version 0x0100

usb_functionfs_mode 0x1

usb_dev_path   "/dev/ffs-mtp/ep0"
usb_epin_path  "/dev/ffs-mtp/ep1"
usb_epout_path "/dev/ffs-mtp/ep2"
usb_epint_path "/dev/ffs-mtp/ep3"

usb_max_packet_size 0x200
